<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4F8DF5"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- background tile -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>

  <!-- sparkles -->
  <g fill="#FFFFFF">
    <path d="M800,338 Q800,372 834,372 Q800,372 800,406 Q800,372 766,372 Q800,372 800,338 Z" opacity="0.9"/>
    <path d="M236,452 Q236,474 258,474 Q236,474 236,496 Q236,474 214,474 Q236,474 236,452 Z" opacity="0.82"/>
  </g>

  <!-- pile of poo: each tier = dark body + lighter lit dome on top -->
  <g>
    <!-- tier 1 (base) -->
    <ellipse cx="512" cy="784" rx="250" ry="118" fill="#5C3A1F"/>
    <ellipse cx="512" cy="752" rx="236" ry="96"  fill="#8A572E"/>
    <!-- tier 2 -->
    <ellipse cx="512" cy="648" rx="196" ry="106" fill="#5C3A1F"/>
    <ellipse cx="512" cy="620" rx="182" ry="86"  fill="#8A572E"/>
    <!-- tier 3 -->
    <ellipse cx="512" cy="528" rx="146" ry="100" fill="#5C3A1F"/>
    <ellipse cx="512" cy="504" rx="134" ry="82"  fill="#8A572E"/>
    <!-- curl tip (leans right) -->
    <path d="M500,372 Q588,376 582,452 Q576,492 520,496 Q470,492 470,452 Q470,402 500,372 Z" fill="#5C3A1F"/>
    <path d="M504,386 Q572,392 566,448 Q560,478 520,480 Q486,478 486,450 Q486,410 504,386 Z" fill="#8A572E"/>

    <!-- specular highlight -->
    <ellipse cx="470" cy="476" rx="46" ry="26" fill="#A87445" opacity="0.55"/>

    <!-- face -->
    <ellipse cx="470" cy="512" rx="42" ry="52" fill="#FFFFFF"/>
    <ellipse cx="556" cy="512" rx="42" ry="52" fill="#FFFFFF"/>
    <circle cx="481" cy="526" r="20" fill="#2A1A0E"/>
    <circle cx="545" cy="526" r="20" fill="#2A1A0E"/>
    <circle cx="489" cy="519" r="6" fill="#FFFFFF"/>
    <circle cx="553" cy="519" r="6" fill="#FFFFFF"/>
    <path d="M450,576 Q512,650 574,576" fill="none" stroke="#2A1A0E" stroke-width="18" stroke-linecap="round"/>
  </g>
</svg>
